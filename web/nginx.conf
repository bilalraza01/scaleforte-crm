# nginx config for the FE service. Reverse-proxies API paths to the Rails
# service via kamal-proxy on the shared kamal Docker network, and serves the
# Vite SPA bundle for everything else (with /index.html fallback so React
# Router deep-links work on direct page loads).

upstream api_backend {
  # kamal-proxy is reachable by container name on the kamal Docker network.
  # Setting Host: api-internal.scaleforte below makes kamal-proxy route the
  # request to the Rails service (registered with that host in api/config/
  # deploy.yml). No DNS record needed for that hostname — it's a label only.
  server kamal-proxy:80;
}

# WebSocket Connection-header upgrade map (used by Action Cable). Must be
# defined in the http context — putting it here at the top of the conf file
# (which nginx includes inside `http {}`) is the standard pattern.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  # Don't cache index.html — its hashed asset references must match the deployed
  # bundle. Cache the hashed assets aggressively.
  location = /index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location /assets/ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Forward Rails-managed paths to the API service through kamal-proxy.
  location ~ ^/(api|up|cable|rails)(/|$) {
    proxy_pass         http://api_backend;
    proxy_set_header   Host              api-internal.scaleforte;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
    proxy_buffering    off;
    proxy_read_timeout 60s;
  }

  # SPA fallback: any other path renders the React app shell.
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}

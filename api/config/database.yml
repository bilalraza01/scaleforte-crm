default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
  database: scaleforte_crm_development

test:
  <<: *default
  url: <%= ENV["TEST_DATABASE_URL"] %>
  database: scaleforte_crm_test

production:
  <<: *default
  database: scaleforte_crm_production
  username: scaleforte
  password: <%= ENV["SCALEFORTE_DATABASE_PASSWORD"] %>
